        copyFile(file("${llamaCppDir}/ggml/src/gguf.cpp"), file("${cppDir}/gguf.cpp"))

        // Llama API
        copyFile(file("${llamaCppDir}/include/llama.h"), file("${cppDir}/llama.h"))
